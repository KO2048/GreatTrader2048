<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GreatTrader</title>
  <meta http-equiv="refresh" content="0; url=./demo/the-great-trader-mvp-v5.html">
  <style>
    :root{
      --bg:#070808;
      --panel:#111416;
      --border:#23292c;
      --text:#ebefef;
      --muted:#899395;
      --gold:#ffe56a;
      --green:#00b07c;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at top right, rgba(255,229,106,.08), transparent 26%),
        radial-gradient(circle at bottom left, rgba(0,176,124,.08), transparent 22%),
        var(--bg);
      color:var(--text);
      font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
    }
    .card{
      width:min(560px,calc(100vw - 32px));
      padding:28px;
      border:1px solid var(--border);
      border-radius:20px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)), var(--panel);
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }
    h1{margin:0 0 10px;font-size:32px}
    p{margin:0 0 14px;color:var(--muted);line-height:1.7}
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,229,106,.2);
      background:rgba(255,229,106,.08);
      color:var(--gold);
      font-size:12px;
      font-weight:700;
      margin-bottom:14px;
    }
    a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:180px;
      height:42px;
      padding:0 16px;
      border-radius:12px;
      text-decoration:none;
      background:linear-gradient(90deg, var(--green), #14d39b);
      color:#042117;
      font-weight:800;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">GreatTrader · MVP Prototype</div>
    <h1>正在进入交易原型</h1>
    <p>这是《大作手 / The Great Trader》的 GitHub Pages 入口页。页面会自动跳转到当前主原型。</p>
    <p>如果没有自动跳转，请点击下面的按钮继续。</p>
    <a href="./demo/the-great-trader-mvp-v5.html">进入主页面</a>
  </main>
</body>
</html>
